<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Digital</title>
    
    <!-- Google Fonts untuk kesan Modern & Clean -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        /* Pilihan Warna Tema Sage Minimalist */
        :root {
            --bg-sage: #f4f6f4;
            --main-sage: #849b84;
            --dark-sage: #617661;
            --text-dark: #333d33;
            --white: #ffffff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-sage);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 450px; /* Ukuran pas untuk layar HP */
            background-color: var(--white);
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Hero / Cover Section */
        .hero {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(180deg, #e2eae2 0%, #ffffff 100%);
        }

        .hero p {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--dark-sage);
            margin-bottom: 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 400;
            color: var(--dark-sage);
            margin: 10px 0;
        }

        /* Section Mempelai */
        .mempelai-section {
            padding: 40px 30px;
            text-align: center;
        }

        .mempelai-box h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--main-sage);
            margin-bottom: 5px;
        }

        .mempelai-box p {
            font-size: 13px;
            color: #777;
            margin-top: 0;
        }

        .ampersand {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-style: italic;
            color: var(--main-sage);
            margin: 20px 0;
        }

        /* Section Acara */
        .acara-section {
            background-color: var(--bg-sage);
            padding: 40px 30px;
            margin: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .acara-section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--dark-sage);
            margin-bottom: 20px;
        }

        .card-acara {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e1ede1;
        }

        .card-acara h4 {
            margin: 0 0 10px 0;
            color: var(--main-sage);
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .card-acara p {
            font-size: 13px;
            margin: 5px 0;
        }

        /* Button Peta */
        .btn-maps {
            display: inline-block;
            background-color: var(--main-sage);
            color: var(--white);
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-maps:hover {
            background-color: var(--dark-sage);
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- HERO COVER -->
        <section class="hero">
            <p>The Wedding of</p>
            <h1 id="title-nama">Loading...</h1>
            <p id="title-tanggal" style="margin-top: 20px; font-weight: 600;"></p>
        </section>

        <!-- DATA MEMPELAI -->
        <section class="mempelai-section">
            <div class="mempelai-box">
                <h2 id="pria-nama">Mempelai Pria</h2>
                <p id="pria-ortu">-</p>
            </div>
            
            <div class="ampersand">&</div>
            
            <div class="mempelai-box">
                <h2 id="wanita-nama">Mempelai Wanita</h2>
                <p id="wanita-ortu">-</p>
            </div>
        </section>

        <!-- DETAIL ACARA -->
        <section class="acara-section">
            <h3>Save The Date</h3>
            
            <div class="card-acara">
                <h4>Akad Nikah</h4>
                <p id="acara-jam-akad">-</p>
            </div>

            <div class="card-acara">
                <h4>Resepsi</h4>
                <p id="acara-jam-resepsi">-</p>
            </div>

            <div class="card-acara">
                <h4>Lokasi Acara</h4>
                <p><strong id="acara-lokasi">-</strong></p>
                <p id="acara-alamat">-</p>
                <a id="link-maps" href="#" target="_blank" class="btn-maps">📍 Buka Google Maps</a>
            </div>
        </section>

        <footer>
            <p>Made by RN-Digitals</p>
        </footer>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // Mengambil data dari data.json
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                // Set data Hero / Cover
                document.getElementById('title-nama').innerText = `${data.mempelaiPria.namaPanggilan} & ${data.mempelaiWanita.namaPanggilan}`;
                document.getElementById('title-tanggal').innerText = data.acara.tanggal;

                // Set data Mempelai Pria
                document.getElementById('pria-nama').innerText = data.mempelaiPria.namaLengkap;
                document.getElementById('pria-ortu').innerText = data.mempelaiPria.putraDari;

                // Set data Mempelai Wanita
                document.getElementById('wanita-nama').innerText = data.mempelaiWanita.namaLengkap;
                document.getElementById('wanita-ortu').innerText = data.mempelaiWanita.putriDari;

                // Set data Waktu & Tempat
                document.getElementById('acara-jam-akad').innerText = data.acara.jamAkad;
                document.getElementById('acara-jam-resepsi').innerText = data.acara.jamResepsi;
                document.getElementById('acara-lokasi').innerText = data.acara.lokasi;
                document.getElementById('acara-alamat').innerText = data.acara.alamat;
                
                // Set Link Google Maps
                document.getElementById('link-maps').href = data.acara.mapsUrl;
            })
            .catch(error => {
                console.error('Gagal mengambil data undangan:', error);
            });
    </script>
</body>
</html>
